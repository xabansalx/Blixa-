<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blixa Core | GitHub Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { brand: { 500: '#ec4899' }, surface: { 950: '#09090b' } }
                } 
            }
        }
    </script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-surface-950 transition-colors duration-300">

    <div id="loader" class="fixed inset-0 z-[9999] bg-white dark:bg-surface-950 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-80 glass-sidebar border-r dark:border-white/5 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                        <span class="text-white font-black text-xl">B</span>
                    </div>
                    <span class="text-2xl font-extrabold tracking-tighter dark:text-white">Blixa</span>
                </div>
                <button onclick="toggleSidebar()" class="lg:hidden dark:text-white"><i data-lucide="x"></i></button>
            </div>
            <button onclick="newChat()" class="w-full py-4 bg-brand-500 hover:bg-brand-600 text-white rounded-2xl font-bold transition-all active:scale-95 flex items-center justify-center gap-2">
                <i data-lucide="plus"></i> New Link
            </button>
        </div>
        <div id="chat-list" class="flex-1 overflow-y-auto px-4 space-y-2 no-scrollbar"></div>
        <div class="p-6 border-t dark:border-white/5 space-y-4">
            <button onclick="toggleDarkMode()" class="w-full p-4 bg-slate-100 dark:bg-white/5 rounded-2xl flex items-center justify-center gap-2 dark:text-white">
                <i data-lucide="moon" class="w-4 h-4"></i> THEME
            </button>
            <button onclick="openModal('settings-modal')" class="w-full p-4 bg-slate-100 dark:bg-white/5 rounded-2xl flex items-center justify-center gap-2 dark:text-white">
                <i data-lucide="settings" class="w-4 h-4"></i> CONFIG
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative overflow-hidden lg:ml-0">
        <header class="h-20 flex items-center justify-between px-6 border-b dark:bg-surface-950/50 backdrop-blur-md dark:border-white/5 z-40">
            <button onclick="toggleSidebar()" class="lg:hidden dark:text-white"><i data-lucide="menu"></i></button>
            <div class="text-lg font-black dark:text-white">CORE <span class="text-brand-500">ENGINE</span></div>
            <button onclick="goHome()" class="p-2 dark:text-white"><i data-lucide="home"></i></button>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-12 space-y-8 pb-40 no-scrollbar scroll-smooth">
            <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center">
                <h1 class="text-5xl md:text-7xl font-black mb-4 dark:text-white tracking-tighter">Blixa AI</h1>
                <p class="text-slate-500 dark:text-slate-400 max-w-md">Quantum-ready neural interface for professional operations.</p>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 p-4 md:p-8 bg-gradient-to-t from-slate-50 dark:from-surface-950 via-transparent">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white dark:bg-zinc-900 rounded-[28px] p-2 shadow-2xl border dark:border-white/10 flex flex-col">
                    <textarea id="user-input" rows="1" placeholder="Enter command..." class="w-full bg-transparent p-4 outline-none resize-none dark:text-white max-h-40" oninput="autoResize(this)"></textarea>
                    <div class="flex items-center justify-between px-4 pb-2">
                        <button onclick="startVoice()" class="p-2 text-slate-400 hover:text-brand-500"><i data-lucide="mic"></i></button>
                        <button id="send-btn" onclick="handleSend()" class="p-3 bg-brand-500 text-white rounded-xl disabled:opacity-30 transition-all" disabled><i data-lucide="send"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-md rounded-[32px] p-8 shadow-2xl border dark:border-white/10">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold dark:text-white">Settings</h2>
                <button onclick="closeModal('settings-modal')" class="dark:text-white"><i data-lucide="x"></i></button>
            </div>
            <input type="password" id="api-key-input" placeholder="API Key" class="w-full p-4 bg-slate-100 dark:bg-black rounded-xl mb-4 outline-none dark:text-white">
            <input type="text" id="api-url-input" placeholder="Gateway URL" class="w-full p-4 bg-slate-100 dark:bg-black rounded-xl mb-6 outline-none dark:text-white">
            <button onclick="saveSettings()" class="w-full py-4 bg-brand-500 text-white font-bold rounded-xl active:scale-95 transition-transform">Save Configuration</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
