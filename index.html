<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blixa Quantum | Autonomous AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        brand: { 500: '#ec4899', 600: '#db2777' },
                        skybrand: { 400: '#38bdf8', 500: '#0ea5e9' },
                        surface: { 50: '#f8fafc', 900: '#0f172a', 950: '#09090b' } 
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                } 
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #27272a; }

        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .dark body { background-color: #09090b; }
        
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .dark .glass-card { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }

        .blixa-logo-circle {
            width: 44px; height: 44px;
            background: #ffffff !important;
            border: 2px solid #ec4899;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0; box-shadow: none !important;
        }
        .blixa-logo-circle img { width: 70%; height: 70%; object-fit: contain; }

        .user-logo-circle {
            width: 44px; height: 44px;
            background: #e2e8f0;
            border: 2px solid #ec4899;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #000000; font-size: 1.25rem; font-weight: 800;
            flex-shrink: 0; text-transform: uppercase;
        }

        .bubble { 
            max-width: 88%; padding: 1.5rem; border-radius: 28px; 
            overflow-x: auto; word-wrap: break-word; line-height: 1.7; font-size: 0.95rem;
        }
        .bubble-user { background: #ec4899; color: white; border-bottom-right-radius: 4px; }
        .bubble-ai { background: white; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; color: #1e293b; }
        .dark .bubble-ai { background: #18181b; border-color: #27272a; color: #f4f4f5; }

        .code-container { position: relative; margin: 1.25rem 0; border-radius: 18px; overflow: hidden; background: #000000 !important; border: 1px solid #333; }
        .code-header { display: flex; justify-content: flex-end; padding: 10px 16px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .copy-btn { color: #9ca3af; font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 5px 10px; border-radius: 8px; background: #1a1a1a; transition: all 0.2s; }
        .copy-btn:hover { color: #ffffff; background: #333; }
        .prose pre { background: #000000 !important; padding: 1.5rem; margin: 0; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; line-height: 1.5; }
        .prose pre code { background: transparent !important; color: #e5e7eb !important; }
        .prose :not(pre) > code { background: rgba(236, 72, 153, 0.1); color: #ec4899; padding: 0.2rem 0.4rem; border-radius: 6px; font-weight: 600; font-size: 0.85em; }

        .app-container { display: flex; height: 100dvh; width: 100%; overflow: hidden; }
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; overflow: hidden; }
        #chat-container { flex: 1; overflow-y: auto; padding-bottom: 140px; }

        #input-wrapper { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.25rem; background: linear-gradient(to top, var(--bg-color) 80%, transparent); z-index: 50; }
        .dark #input-wrapper { --bg-color: #09090b; }
        #input-wrapper { --bg-color: #f8fafc; }

        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.2; } 100% { transform: scale(0.8); opacity: 0.5; } }
        .mic-glow { box-shadow: 0 0 30px 10px rgba(236, 72, 153, 0.4); animation: mic-shimmer 2s infinite ease-in-out; }
        @keyframes mic-shimmer { 0%, 100% { box-shadow: 0 0 20px 5px rgba(236, 72, 153, 0.4); } 50% { box-shadow: 0 0 50px 20px rgba(236, 72, 153, 0.6); } }
        .voice-ring { animation: pulse-ring 3s infinite ease-in-out; }

        @keyframes pan { 0% { transform: translateX(-150%); } 100% { transform: translateX(150%); } }
    </style>
</head>
<body class="bg-surface-50 dark:bg-surface-950 text-zinc-900 dark:text-white">

    <div id="loader" class="fixed inset-0 z-[999] bg-white dark:bg-surface-950 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="blixa-logo-circle !w-28 !h-28 !border-4 mb-6">
            <img src="blixa.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712139.png'">
        </div>
        <div class="flex flex-col items-center gap-2">
            <div class="w-12 h-1 px-1 bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden">
                <div class="w-1/2 h-full bg-brand-500 rounded-full animate-[pan_1.5s_infinite_linear]"></div>
            </div>
            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400">Connecting to Neural Network...</p>
        </div>
    </div>

    <div class="app-container">
        <div id="voice-overlay" class="fixed inset-0 z-[300] hidden bg-black flex flex-col items-center justify-center text-white transition-all duration-500">
            <div class="relative flex items-center justify-center mb-16">
                <div class="absolute w-64 h-64 border-2 border-brand-500/20 rounded-full voice-ring"></div>
                <div id="mic-container" class="z-10 w-32 h-32 bg-brand-500 rounded-full flex items-center justify-center mic-glow shadow-2xl">
                    <i data-lucide="mic" class="w-14 h-14 text-white"></i>
                </div>
            </div>
            <div class="text-center px-10">
                <p id="voice-transcript" class="text-white text-2xl font-medium italic max-w-lg min-h-[4rem]">"Say something..."</p>
            </div>
            <button onclick="stopVoiceMode()" class="absolute bottom-12 p-5 bg-white/10 hover:bg-red-500 rounded-full border border-white/20">
                <i data-lucide="x" class="w-8 h-8 text-white"></i>
            </button>
        </div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-[100] w-80 glass-card border-r transform -translate-x-full lg:translate-x-0 lg:relative transition-transform duration-500 flex flex-col">
            <div class="p-6">
                <div class="flex items-center justify-between mb-10">
                    <div class="flex items-center gap-2">
                        <div class="blixa-logo-circle !w-8 !h-8 !border-2"><img src="blixa.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712139.png'"></div>
                        <span class="text-lg font-black tracking-tight uppercase">BLIXA <span class="text-brand-500">CORE</span></span>
                    </div>
                    <button onclick="toggleSidebar()" class="lg:hidden p-2"><i data-lucide="x"></i></button>
                </div>
                <button onclick="newChat()" class="w-full flex items-center justify-center gap-3 py-4 bg-sky-400 hover:bg-sky-500 text-white rounded-2xl font-bold shadow-xl mb-8">
                    <i data-lucide="sparkles" class="w-5 h-5"></i> New Intelligence
                </button>
            </div>
            <div id="chat-list" class="flex-1 overflow-y-auto px-4 space-y-2"></div>
            <div class="p-4 border-t border-zinc-200 dark:border-zinc-800">
                <div class="flex items-center gap-3 p-4 bg-zinc-100/50 dark:bg-zinc-900/50 rounded-2xl">
                    <div class="user-logo-circle !w-11 !h-11 text-lg">U</div>
                    <div class="flex-1 text-xs font-black truncate uppercase">Operator 01</div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button onclick="toggleDarkMode()" class="p-3 flex flex-col items-center gap-1 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-xl transition">
                        <i data-lucide="sun" class="w-4 h-4 dark:hidden text-orange-400"></i>
                        <i data-lucide="moon" class="w-4 h-4 hidden dark:block text-brand-500"></i>
                        <span class="text-[9px] font-black uppercase">Theme</span>
                    </button>
                    <button onclick="openModal('settings-modal')" class="p-3 flex flex-col items-center gap-1 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-xl transition">
                        <i data-lucide="settings" class="w-4 h-4"></i>
                        <span class="text-[9px] font-black uppercase">Core</span>
                    </button>
                </div>
            </div>
        </aside>

        <main id="main-content">
            <header class="flex-none flex items-center justify-between p-4 md:px-8 glass-card border-b z-40">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2"><i data-lucide="menu"></i></button>
                    <div class="flex items-center gap-2">
                        <div class="blixa-logo-circle !w-8 !h-8 !border-2"><img src="blixa.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712139.png'"></div>
                        <span class="text-lg font-black tracking-tight uppercase">BLIXA <span class="text-brand-500">CORE</span></span>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="goHome()" class="p-2.5 text-zinc-500 hover:text-brand-500 transition-colors"><i data-lucide="home"></i></button>
                    <button onclick="newChat()" class="p-2.5 bg-brand-500 text-white rounded-xl shadow-lg hover:scale-105 active:scale-95 transition-all"><i data-lucide="plus"></i></button>
                </div>
            </header>

            <div id="chat-container" class="no-scrollbar">
                <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center p-6 min-h-[70vh]">
                    <div class="blixa-logo-circle !w-36 !h-36 !border-4 mb-8">
                        <img src="blixa.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712139.png'">
                    </div>
                    <h1 class="text-5xl md:text-8xl font-black mb-4 tracking-tighter uppercase">BLIXA <span class="text-brand-500">CORE</span></h1>
                    <p class="text-zinc-500 dark:text-zinc-400 text-base md:text-lg max-w-xl font-medium">Neural Interface Stable. Perfect centering enabled.</p>
                </div>
            </div>

            <div id="input-wrapper">
                <div class="max-w-4xl mx-auto">
                    <div class="glass-card rounded-[32px] p-1.5 flex flex-col shadow-2xl border dark:border-white/5 focus-within:ring-2 ring-brand-500/20">
                        <textarea id="user-input" rows="1" placeholder="Type command..." class="w-full bg-transparent px-5 py-3 outline-none resize-none text-zinc-800 dark:text-white max-h-48 text-base font-medium" oninput="autoResize(this)"></textarea>
                        <div class="flex items-center justify-between px-4 pb-2">
                            <button onclick="startVoiceMode()" class="p-2.5 text-zinc-400 hover:text-brand-500 transition-all"><i data-lucide="mic" class="w-6 h-6"></i></button>
                            <button id="send-btn" onclick="handleSend()" class="p-3 bg-brand-500 text-white rounded-2xl shadow-xl transition-all active:scale-90" disabled><i data-lucide="navigation" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[200] hidden flex items-center justify-center bg-black/80 backdrop-blur-xl p-4">
        <div class="bg-white dark:bg-[#1c1c1e] w-full max-w-md rounded-[40px] overflow-hidden p-10 space-y-6 text-zinc-900 dark:text-white shadow-2xl border dark:border-white/5">
            <h2 class="text-2xl font-black uppercase tracking-tight">Core Configuration</h2>
            
            <div class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-1">API Key</label>
                    <input type="password" id="api-key-input" placeholder="Enter Neural Key" class="w-full p-4 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-[#2c2c2e] outline-none focus:ring-2 ring-brand-500/20 transition-all">
                </div>
                
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-1">Endpoint URL</label>
                    <input type="text" id="api-url-input" placeholder="https://api.example.com" class="w-full p-4 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-[#2c2c2e] outline-none focus:ring-2 ring-brand-500/20 transition-all">
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-1">AI Model</label>
                    <input type="text" id="model-input" placeholder="e.g. google/gemini-2.0-flash" class="w-full p-4 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-[#2c2c2e] outline-none focus:ring-2 ring-brand-500/20 transition-all">
                </div>
            </div>

            <button onclick="saveSettings()" class="w-full py-4 bg-brand-500 hover:bg-brand-600 text-white font-black rounded-2xl uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-brand-500/20">Synchronize</button>
            <button onclick="closeModal('settings-modal')" class="w-full text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 text-xs font-bold transition-colors">Close Interface</button>
        </div>
    </div>

    <script>
        let state = {
            apiBase: localStorage.getItem('blixa_url') || 'https://openrouter.ai/api/v1',
            apiKey: localStorage.getItem('blixa_key') || '',
            model: localStorage.getItem('blixa_model') || 'google/gemini-2.0-flash-001',
            chats: JSON.parse(localStorage.getItem('blixa_chats')) || [],
            currentChatId: null,
            isDarkMode: localStorage.getItem('blixa_theme') === 'dark',
            isTyping: false,
            voiceMode: false,
            // Logic for Identity
            identity: "Your name is Blixa, an autonomous AI entity. When asked for your name, always answer with Blixa."
        };

        const elements = {
            chatContainer: document.getElementById('chat-container'),
            chatList: document.getElementById('chat-list'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            welcomeView: document.getElementById('welcome-view'),
            loader: document.getElementById('loader'),
            voiceOverlay: document.getElementById('voice-overlay'),
            voiceTranscript: document.getElementById('voice-transcript')
        };

        const recognition = 'webkitSpeechRecognition' in window ? new webkitSpeechRecognition() : null;
        if(recognition) { recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'en-US'; }

        window.onload = () => {
            lucide.createIcons();
            if (state.isDarkMode) document.documentElement.classList.add('dark');
            document.getElementById('api-url-input').value = state.apiBase;
            document.getElementById('api-key-input').value = state.apiKey;
            document.getElementById('model-input').value = state.model;
            renderChatList();
            setTimeout(() => { elements.loader.classList.add('opacity-0'); setTimeout(() => elements.loader.style.display = 'none', 500); }, 2000);
        };

        function startVoiceMode() { if (!recognition) return; state.voiceMode = true; elements.voiceOverlay.classList.remove('hidden'); elements.voiceTranscript.innerText = '"Say something..."'; recognition.start(); }
        function stopVoiceMode() { state.voiceMode = false; elements.voiceOverlay.classList.add('hidden'); recognition.stop(); window.speechSynthesis.cancel(); }

        if(recognition) {
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                elements.voiceTranscript.innerText = `"${text}"`;
                if (event.results[0].isFinal) handleVoiceSend(text);
            };
        }

        async function handleVoiceSend(text) {
            elements.userInput.value = text;
            await handleSend();
            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (!chat) return;
            const lastMessage = chat.messages[chat.messages.length - 1].content;
            speakText(lastMessage);
        }

        function speakText(text) {
            const cleanText = text.replace(/[*_~`]/g, '').trim();
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'hi-IN';
            utterance.onend = () => { if(state.voiceMode) { elements.voiceTranscript.innerText = '"Say something..."'; recognition.start(); } };
            window.speechSynthesis.speak(utterance);
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
            elements.sendBtn.disabled = !textarea.value.trim();
        }

        function toggleDarkMode() {
            state.isDarkMode = !state.isDarkMode;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('blixa_theme', state.isDarkMode ? 'dark' : 'light');
            lucide.createIcons();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function goHome() { location.reload(); }

        function saveSettings() {
            state.apiBase = document.getElementById('api-url-input').value;
            state.apiKey = document.getElementById('api-key-input').value;
            state.model = document.getElementById('model-input').value;
            localStorage.setItem('blixa_url', state.apiBase);
            localStorage.setItem('blixa_key', state.apiKey);
            localStorage.setItem('blixa_model', state.model);
