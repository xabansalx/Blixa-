<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blixa AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --vh: 1vh; }
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0;
            background-color: #f8fafc;
            transition: background-color 0.3s ease;
        }
        
        .dark body { background-color: #0f0f10; color: #e3e3e3; }

        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            z-index: 9999;
        }
        .dark #loading { background: #0f0f10; color: white; }

        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .dark .glass-card {
            background: rgba(30, 30, 32, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* Message Bubble Specifics */
        .message-user {
            border-bottom-right-radius: 4px;
        }
        .message-assistant {
            border-bottom-left-radius: 4px;
        }

        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .prose pre {
            background-color: rgba(0, 0, 0, 0.05);
            padding: 1rem;
            border-radius: 0.75rem;
            overflow-x: auto;
        }
        .dark .prose pre { background-color: rgba(0, 0, 0, 0.3); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .typing::after {
            content: "▊";
            animation: blink 1s infinite;
            margin-left: 4px;
            color: #3b82f6;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen font-sans">

    <div id="loading">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500"></div>
            <p class="font-medium tracking-tight">Blixa is waking up...</p>
        </div>
    </div>

    <header class="md:hidden flex items-center justify-between p-4 border-b dark:border-zinc-800 sticky top-0 bg-inherit/80 backdrop-blur-md z-40">
        <button onclick="toggleSidebar()" class="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg">
            <i data-lucide="menu"></i>
        </button>
        <span class="font-bold tracking-tighter text-xl">BLIXA</span>
        <button onclick="newChat()" class="p-2 text-blue-500">
            <i data-lucide="plus"></i>
        </button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-[#131314] border-r dark:border-zinc-800 transform -translate-x-full md:translate-x-0 md:relative flex flex-col h-full transition-all">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-2 font-black text-2xl tracking-tighter">
                <span class="text-blue-500">✦</span> BLIXA
            </div>
            <button onclick="toggleSidebar()" class="md:hidden p-2"><i data-lucide="x"></i></button>
        </div>

        <button onclick="newChat()" class="mx-4 mb-6 flex items-center gap-3 px-4 py-3 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/30 rounded-2xl transition text-sm font-bold">
            <i data-lucide="plus" class="w-4 h-4"></i> New Chat
        </button>

        <div id="chat-list" class="flex-1 overflow-y-auto px-3 space-y-1 no-scrollbar">
            </div>

        <div class="p-4 border-t dark:border-zinc-800 space-y-1">
            <button onclick="toggleDarkMode()" class="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-xl text-sm font-medium transition">
                <i data-lucide="moon" id="dark-icon"></i> <span id="dark-text">Appearance</span>
            </button>
            <button onclick="openModal('settings-modal')" class="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-xl text-sm font-medium transition">
                <i data-lucide="settings"></i> Settings
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative min-w-0 h-screen">
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 pb-44 no-scrollbar scroll-smooth">
            <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center py-20 animate-in fade-in zoom-in duration-700">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mb-6 shadow-xl shadow-blue-500/20">
                    <i data-lucide="sparkles" class="text-white w-10 h-10"></i>
                </div>
                <h1 class="text-4xl md:text-5xl font-black tracking-tighter mb-4">How can Blixa help?</h1>
                <p class="text-gray-500 dark:text-zinc-400 text-lg max-w-md">Your minimalist AI workspace. Connected to the world's most powerful models.</p>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 md:left-72 bg-gradient-to-t from-slate-50 dark:from-[#0f0f10] via-slate-50/95 dark:via-[#0f0f10]/95 to-transparent pt-12 pb-8 px-4 z-30">
            <div class="max-w-4xl mx-auto">
                <div class="glass-card rounded-[2rem] p-2 flex flex-col transition-all focus-within:ring-2 ring-blue-500/20">
                    <textarea id="user-input" rows="1" placeholder="Type your message..." 
                        class="w-full bg-transparent p-4 outline-none resize-none max-h-48 text-base md:text-lg dark:placeholder-zinc-500"></textarea>
                    
                    <div class="flex justify-between items-center px-3 pb-2">
                        <div class="flex gap-2">
                            <button onclick="openModal('sys-modal')" class="p-2.5 hover:bg-black/5 dark:hover:bg-white/5 rounded-full text-zinc-500 transition" title="System Persona">
                                <i data-lucide="bot" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <button id="send-btn" onclick="handleSend()" class="p-3 bg-blue-600 hover:bg-blue-700 disabled:opacity-20 disabled:grayscale text-white rounded-2xl shadow-lg shadow-blue-600/30 transition-all active:scale-95" disabled>
                            <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <p class="text-[10px] text-center mt-3 text-zinc-400 font-medium uppercase tracking-widest opacity-60">Unified AI Interface &bull; Blixa v2.0</p>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
        <div class="glass-card w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-in fade-in zoom-in duration-200">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black tracking-tight">Config</h2>
                <button onclick="closeModal('settings-modal')" class="p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-4 rounded-2xl border dark:border-zinc-700 bg-black/5 dark:bg-white/5 outline-none focus:ring-2 ring-blue-500/50 transition" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">AI Model</label>
                    <input type="text" id="model-input" class="w-full p-4 rounded-2xl border dark:border-zinc-700 bg-black/5 dark:bg-white/5 outline-none focus:ring-2 ring-blue-500/50 transition" placeholder="deepseek/deepseek-r1:free">
                </div>
                <button onclick="saveSettings()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/30 transition active:scale-[0.98]">Update Blixa</button>
            </div>
        </div>
    </div>

    <div id="sys-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
        <div class="glass-card w-full max-w-md rounded-[2.5rem] p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">System Persona</h2>
                <button onclick="closeModal('sys-modal')"><i data-lucide="x"></i></button>
            </div>
            <textarea id="sys-prompt-input" rows="5" class="w-full p-4 rounded-2xl border dark:border-zinc-700 bg-black/5 dark:bg-white/5 outline-none mb-6" placeholder="Define how Blixa should behave..."></textarea>
            <button onclick="saveSystemPrompt()" class="w-full py-3 bg-zinc-900 dark:bg-blue-600 text-white font-bold rounded-2xl">Apply Global Persona</button>
        </div>
    </div>

    <script>
        // --- SENIOR ENGINEER IMPLEMENTATION ---

        let state = {
            apiKey: localStorage.getItem('blixa_key') || '',
            model: localStorage.getItem('blixa_model') || 'deepseek/deepseek-r1:free',
            systemPrompt: localStorage.getItem('blixa_sys') || 'You are Blixa, a helpful and concise AI assistant.',
            chats: JSON.parse(localStorage.getItem('blixa_chats')) || [],
            currentChatId: null,
            isDarkMode: localStorage.getItem('blixa_theme') === 'dark',
            isSidebarOpen: false
        };

        const elements = {
            loading: document.getElementById('loading'),
            chatContainer: document.getElementById('chat-container'),
            chatList: document.getElementById('chat-list'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            welcomeView: document.getElementById('welcome-view'),
            apiKeyInput: document.getElementById('api-key-input'),
            modelInput: document.getElementById('model-input'),
            sysInput: document.getElementById('sys-prompt-input')
        };

        window.addEventListener('DOMContentLoaded', () => {
            if (state.isDarkMode) document.documentElement.classList.add('dark');
            
            elements.apiKeyInput.value = state.apiKey;
            elements.modelInput.value = state.model;
            elements.sysInput.value = state.systemPrompt;
            
            renderChatList();
            updateThemeUI();
            lucide.createIcons();
            
            elements.userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                elements.sendBtn.disabled = !this.value.trim();
            });

            setTimeout(() => { elements.loading.style.display = 'none'; }, 600);
        });

        // --- UI Operations ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            state.isSidebarOpen = !state.isSidebarOpen;
            sidebar.style.transform = state.isSidebarOpen ? 'translateX(0)' : '';
        }

        function toggleDarkMode() {
            state.isDarkMode = !state.isDarkMode;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('blixa_theme', state.isDarkMode ? 'dark' : 'light');
            updateThemeUI();
        }

        function updateThemeUI() {
            const icon = document.getElementById('dark-icon');
            const text = document.getElementById('dark-text');
            if (state.isDarkMode) {
                icon.setAttribute('data-lucide', 'sun');
                text.innerText = 'Light Mode';
            } else {
                icon.setAttribute('data-lucide', 'moon');
                text.innerText = 'Dark Mode';
            }
            lucide.createIcons();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function saveSettings() {
            state.apiKey = elements.apiKeyInput.value.trim();
            state.model = elements.modelInput.value.trim() || 'deepseek/deepseek-r1:free';
            localStorage.setItem('blixa_key', state.apiKey);
            localStorage.setItem('blixa_model', state.model);
            closeModal('settings-modal');
        }

        function saveSystemPrompt() {
            state.systemPrompt = elements.sysInput.value.trim();
            localStorage.setItem('blixa_sys', state.systemPrompt);
            closeModal('sys-modal');
        }

        // --- Chat Lifecycle ---
        function newChat() {
            state.currentChatId = null;
            elements.chatContainer.innerHTML = '';
            elements.chatContainer.appendChild(elements.welcomeView);
            elements.welcomeView.classList.remove('hidden');
            if(window.innerWidth < 768 && state.isSidebarOpen) toggleSidebar();
            renderChatList();
        }

        function renderChatList() {
            elements.chatList.innerHTML = '';
            state.chats.slice().reverse().forEach(chat => {
                const isActive = chat.id === state.currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition ${isActive ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400' : 'hover:bg-gray-100 dark:hover:bg-zinc-800'}`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `
                    <i data-lucide="message-square" class="w-4 h-4 opacity-70"></i>
                    <span class="truncate flex-1 text-sm font-medium">${chat.title}</span>
                    <button onclick="deleteChat(event, ${chat.id})" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                    </button>
                `;
                elements.chatList.appendChild(div);
            });
            lucide.createIcons();
        }

        function loadChat(id) {
            state.currentChatId = id;
            const chat = state.chats.find(c => c.id === id);
            elements.welcomeView.classList.add('hidden');
            elements.chatContainer.innerHTML = '';
            chat.messages.forEach(msg => appendMessageUI(msg.role, msg.content));
            renderChatList();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function deleteChat(e, id) {
            e.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) newChat();
            localStorage.setItem('blixa_chats', JSON.stringify(state.chats));
            renderChatList();
        }

        async function handleSend() {
            const text = elements.userInput.value.trim();
            if (!text || !state.apiKey) {
                if (!state.apiKey) openModal('settings-modal');
                return;
            }

            if (!state.currentChatId) {
                state.currentChatId = Date.now();
                state.chats.push({ id: state.currentChatId, title: text.substring(0, 30), messages: [] });
                elements.welcomeView.classList.add('hidden');
            }

            const currentChat = state.chats.find(c => c.id === state.currentChatId);
            currentChat.messages.push({ role: 'user', content: text });
            appendMessageUI('user', text);
            
            elements.userInput.value = '';
            elements.userInput.style.height = 'auto';
            elements.sendBtn.disabled = true;

            const aiMsgId = appendMessageUI('assistant', '');
            const aiContainer = document.getElementById(aiMsgId);
            aiContainer.classList.add('typing');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": state.model,
                        "messages": [{ "role": "system", "content": state.systemPrompt }, ...currentChat.messages],
                        "stream": true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const content = data.choices[0]?.delta?.content || "";
                                fullResponse += content;
                                aiContainer.innerHTML = marked.parse(fullResponse);
                                elements.chatContainer.scrollTo(0, elements.chatContainer.scrollHeight);
                            } catch (e) {}
                        }
                    }
                }

                aiContainer.classList.remove('typing');
                currentChat.messages.push({ role: 'assistant', content: fullResponse });
                localStorage.setItem('blixa_chats', JSON.stringify(state.chats));
                renderChatList();

            } catch (err) {
                aiContainer.innerHTML = `<span class="text-red-500 font-bold">API Error: Check key/settings.</span>`;
                aiContainer.classList.remove('typing');
            }
        }

        function appendMessageUI(role, content) {
            const id = 'msg-' + Math.random().toString(36).substr(2, 9);
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-4 duration-500`;
            
            wrapper.innerHTML = `
                <div class="flex gap-3 max-w-[85%] md:max-w-[75%] ${isUser ? 'flex-row-reverse' : 'flex-row'}">
                    <div class="w-8 h-8 rounded-xl flex-shrink-0 flex items-center justify-center text-[10px] font-black ${isUs
