<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blixa AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <style>
        :root { --vh: 1vh; }
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0;
            transition: background-color 0.3s ease;
        }
        
        body { background-color: #ffffff; color: #1f2937; }
        .dark body { background-color: #131314; color: #e3e3e3; }

        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: white; z-index: 9999;
        }
        .dark #loading { background: #131314; color: white; }

        #sidebar { transition: transform 0.3s ease, background-color 0.3s ease; }

        /* Code Blocks Styling */
        .prose pre {
            background-color: #18181b;
            padding: 1rem; border-radius: 0.5rem; overflow-x: auto;
            color: #f4f4f5;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .typing::after {
            content: "●"; animation: blink 1s infinite;
            margin-left: 4px; color: #4285f4;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Message Bubble Transitions */
        .message-fade { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <div id="loading">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500"></div>
            <p class="font-medium">Initializing Blixa...</p>
        </div>
    </div>

    <header class="md:hidden flex items-center justify-between p-4 border-b border-gray-200 dark:border-zinc-800 sticky top-0 bg-white dark:bg-[#131314] z-40">
        <button onclick="toggleSidebar()" class="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg transition">
            <i data-lucide="menu"></i>
        </button>
        <span class="font-semibold text-lg">Blixa</span>
        <button onclick="newChat()" class="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg text-blue-500 transition">
            <i data-lucide="plus"></i>
        </button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-gray-50 dark:bg-[#1e1e20] border-r border-gray-200 dark:border-zinc-800 transform -translate-x-full md:translate-x-0 md:relative flex flex-col h-full">
        <div class="p-4 flex items-center justify-between">
            <div class="flex items-center gap-2 font-bold text-xl px-2">
                <span class="text-blue-500 text-2xl">✦</span> Blixa
            </div>
            <button onclick="toggleSidebar()" class="md:hidden p-2"><i data-lucide="x"></i></button>
        </div>

        <button onclick="newChat()" class="mx-4 my-2 flex items-center gap-3 px-4 py-3 bg-gray-200/50 dark:bg-zinc-800/50 hover:bg-gray-200 dark:hover:bg-zinc-700 rounded-full transition text-sm font-medium">
            <i data-lucide="plus" class="w-4 h-4"></i> New Chat
        </button>

        <div id="chat-list" class="flex-1 overflow-y-auto px-2 mt-4 space-y-1 no-scrollbar text-gray-700 dark:text-zinc-300"></div>

        <div class="p-4 border-t border-gray-200 dark:border-zinc-800 space-y-2">
            <button onclick="toggleDarkMode()" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-gray-200 dark:hover:bg-zinc-800 rounded-lg text-sm transition">
                <i data-lucide="moon" id="dark-icon"></i> <span id="dark-text">Dark Mode</span>
            </button>
            <button onclick="openModal('settings-modal')" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-gray-200 dark:hover:bg-zinc-800 rounded-lg text-sm transition">
                <i data-lucide="settings"></i> Settings
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative min-w-0 h-full bg-white dark:bg-[#131314] transition-colors">
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 pb-40 no-scrollbar">
            <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center py-20">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-blue-500/20">
                    <span class="text-white text-3xl font-bold">✦</span>
                </div>
                <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-blue-600 via-purple-500 to-red-400 bg-clip-text text-transparent mb-4">Hello, I'm Blixa</h1>
                <p class="text-gray-500 dark:text-zinc-400 text-lg">Your personal AI assistant. How can I help today?</p>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 md:left-72 bg-gradient-to-t from-white dark:from-[#131314] via-white dark:via-[#131314] to-transparent pt-10 pb-6 px-4">
            <div class="max-w-3xl mx-auto relative group">
                <div class="bg-gray-100 dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 rounded-3xl p-2 flex flex-col shadow-sm focus-within:shadow-md transition-all duration-300">
                    <textarea id="user-input" rows="1" placeholder="Enter a prompt here" 
                        class="w-full bg-transparent p-3 outline-none resize-none max-h-48 text-base md:text-lg text-gray-800 dark:text-white placeholder-gray-500 dark:placeholder-zinc-500"></textarea>
                    <div class="flex justify-between items-center px-2 pb-1">
                        <button onclick="openModal('sys-modal')" class="p-2 hover:bg-gray-200 dark:hover:bg-zinc-700 rounded-full text-zinc-500 transition">
                            <i data-lucide="bot" class="w-5 h-5"></i>
                        </button>
                        <button id="send-btn" onclick="handleSend()" class="p-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-30 disabled:bg-zinc-500 text-white rounded-full transition shadow-md" disabled>
                            <i data-lucide="arrow-up" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-md rounded-2xl p-6 shadow-2xl border border-gray-100 dark:border-zinc-800">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold dark:text-white">Settings</h2>
                <button onclick="closeModal('settings-modal')" class="dark:text-zinc-400"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-zinc-300">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-3 rounded-lg border border-gray-200 dark:border-zinc-700 bg-transparent dark:text-white outline-none focus:border-blue-500 transition" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-zinc-300">Model Name</label>
                    <input type="text" id="model-input" class="w-full p-3 rounded-lg border border-gray-200 dark:border-zinc-700 bg-transparent dark:text-white outline-none focus:border-blue-500 transition">
                </div>
                <button onclick="saveSettings()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="sys-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/60 p-4">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-md rounded-2xl p-6 border border-gray-100 dark:border-zinc-800">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold dark:text-white">System Prompt</h2>
                <button onclick="closeModal('sys-modal')" class="dark:text-zinc-400"><i data-lucide="x"></i></button>
            </div>
            <textarea id="sys-prompt-input" rows="5" class="w-full p-3 rounded-lg border border-gray-200 dark:border-zinc-700 bg-transparent dark:text-white outline-none mb-4"></textarea>
            <button onclick="saveSystemPrompt()" class="w-full py-2 bg-blue-600 text-white rounded-lg transition">Apply Globally</button>
        </div>
    </div>

    <script>
        let state = {
            apiKey: localStorage.getItem('blixa_key') || '',
            model: localStorage.getItem('blixa_model') || 'google/gemini-2.0-flash-001',
            systemPrompt: localStorage.getItem('blixa_sys') || 'You are Blixa, a helpful AI assistant.',
            chats: JSON.parse(localStorage.getItem('blixa_chats')) || [],
            currentChatId: null,
            isDarkMode: localStorage.getItem('blixa_theme') === 'dark',
            isSidebarOpen: false
        };

        const elements = {
            loading: document.getElementById('loading'),
            chatContainer: document.getElementById('chat-container'),
            chatList: document.getElementById('chat-list'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            welcomeView: document.getElementById('welcome-view'),
            apiKeyInput: document.getElementById('api-key-input'),
            modelInput: document.getElementById('model-input'),
            sysInput: document.getElementById('sys-prompt-input')
        };

        window.addEventListener('DOMContentLoaded', () => {
            if (state.isDarkMode) document.documentElement.classList.add('dark');
            elements.apiKeyInput.value = state.apiKey;
            elements.modelInput.value = state.model;
            elements.sysInput.value = state.systemPrompt;
            renderChatList();
            updateThemeUI();
            lucide.createIcons();
            
            elements.userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                elements.sendBtn.disabled = !this.value.trim();
            });

            setTimeout(() => elements.loading.style.display = 'none', 600);
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            state.isSidebarOpen = !state.isSidebarOpen;
            sidebar.style.transform = state.isSidebarOpen ? 'translateX(0)' : '';
        }

        function toggleDarkMode() {
            state.isDarkMode = !state.isDarkMode;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('blixa_theme', state.isDarkMode ? 'dark' : 'light');
            updateThemeUI();
        }

        function updateThemeUI() {
            const icon = document.getElementById('dark-icon');
            const text = document.getElementById('dark-text');
            icon.setAttribute('data-lucide', state.isDarkMode ? 'sun' : 'moon');
            text.innerText = state.isDarkMode ? 'Light Mode' : 'Dark Mode';
            lucide.createIcons();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function saveSettings() {
            state.apiKey = elements.apiKeyInput.value.trim();
            state.model = elements.modelInput.value.trim() || 'google/gemini-2.0-flash-001';
            localStorage.setItem('blixa_key', state.apiKey);
            localStorage.setItem('blixa_model', state.model);
            closeModal('settings-modal');
        }

        function saveSystemPrompt() {
            state.systemPrompt = elements.sysInput.value.trim();
            localStorage.setItem('blixa_sys', state.systemPrompt);
            closeModal('sys-modal');
        }

        function newChat() {
            state.currentChatId = null;
            elements.chatContainer.innerHTML = '';
            elements.chatContainer.appendChild(elements.welcomeView);
            elements.welcomeView.classList.remove('hidden');
            renderChatList();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function renderChatList() {
            elements.chatList.innerHTML = '';
            state.chats.slice().reverse().forEach(chat => {
                const isActive = chat.id === state.currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer transition ${isActive ? 'bg-gray-200 dark:bg-zinc-800 text-blue-600 dark:text-blue-400' : 'hover:bg-gray-200 dark:hover:bg-zinc-800/50'}`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `
                    <i data-lucide="message-square" class="w-4 h-4 flex-shrink-0"></i>
                    <span class="truncate flex-1 text-sm font-medium">${chat.title}</span>
                    <button onclick="deleteChat(event, ${chat.id})" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                    </button>
                `;
                elements.chatList.appendChild(div);
            });
            lucide.createIcons();
        }

        function loadChat(id) {
            state.currentChatId = id;
            const chat = state.chats.find(c => c.id === id);
            elements.welcomeView.classList.add('hidden');
            elements.chatContainer.innerHTML = '';
            chat.messages.forEach(msg => appendMessageUI(msg.role, msg.content));
            renderChatList();
            if(window.innerWidth < 768 && state.isSidebarOpen) toggleSidebar();
        }

        function deleteChat(e, id) {
            e.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) newChat();
            localStorage.setItem('blixa_chats', JSON.stringify(state.chats));
            renderChatList();
        }

        async function handleSend() {
            const text = elements.userInput.value.trim();
            if (!text || !state.apiKey) {
                if (!state.apiKey) openModal('settings-modal');
                return;
            }

            if (!state.currentChatId) {
                state.currentChatId = Date.now();
                state.chats.push({ id: state.currentChatId, title: text.substring(0, 30), messages: [] });
                elements.welcomeView.classList.add('hidden');
            }

            const currentChat = state.chats.find(c => c.id === state.currentChatId);
            currentChat.messages.push({ role: 'user', content: text });
            appendMessageUI('user', text);
            
            elements.userInput.value = '';
            elements.userInput.style.height = 'auto';

            const aiMsgId = appendMessageUI('assistant', '');
            const aiContainer = document.getElementById(aiMsgId);
            aiContainer.classList.add('typing');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${state.apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "model": state.model,
                        "messages": [{ "role": "system", "content": state.systemPrompt }, ...currentChat.messages],
                        "stream": true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                fullResponse += data.choices[0]?.delta?.content || "";
                                aiContainer.innerHTML = marked.parse(fullResponse);
                                elements.chatContainer.scrollTo(0, elements.chatContainer.scrollHeight);
                            } catch (e) {}
                        }
                    }
                }
                aiContainer.classList.remove('typing');
                currentChat.messages.push({ role: 'assistant', content: fullResponse });
                localStorage.setItem('blixa_chats', JSON.stringify(state.chats));
                renderChatList();
            } catch (err) {
                aiContainer.innerHTML = "<span class='text-red-500'>Connection Error. Check API Key.</span>";
            }
        }

        function appendMessageUI(role, content) {
            const id = 'msg-' + Date.now();
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} message-fade`;

            const bgClass = isUser 
                ? 'bg-gray-100 dark:bg-zinc-800 text-gray-800 dark:text-zinc-100 rounded-2xl rounded-tr-none shadow-sm' 
                : 'bg-white dark:bg-zinc-900 border border-gray-100 dark:border-zinc-800 text-gray-800 dark:text-zinc-200 rounded-2xl rounded-tl-none shadow-sm';

            wrapper.innerHTML = `
                <div class="flex gap-3 max-w-[85%] md:max-w-[75%] ${isUser ? 'flex-row-reverse' : 'flex-row'} items-start">
                    <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-[10px] font-black border-2 ${isUser ? 'bg-blue-600 border-blue-400 text-white' : 'bg-purple-600 border-purple-400 text-white'}">
                        ${isUser ? 'YOU' : 'BX'}
                    </div>
                    <div class="px-4 py-3 ${bgClass}">
                        <div id="${id}" class="prose dark:prose-invert prose-sm md:prose-base transition-colors overflow-hidden">
                            ${marked.parse(content || '')}
                        </div>
                    </div>
                </div>
            `;
            
            elements.chatContainer.appendChild(wrapper);
            elements.chatContainer.scrollTo({ top: elements.chatContainer.scrollHeight, behavior: 'smooth' });
            return id;
        }
    </script>
</body>
</html>
